<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background circle -->
  <rect width="32" height="32" rx="8" fill="#0c0c0f"/>
  <!-- Indigo glow ring -->
  <rect width="32" height="32" rx="8" fill="url(#grad)" opacity="0.6"/>
  <!-- Database cylinder body -->
  <ellipse cx="16" cy="10" rx="8" ry="2.5" fill="#6366f1" opacity="0.9"/>
  <rect x="8" y="10" width="16" height="8" fill="#6366f1" opacity="0.75"/>
  <ellipse cx="16" cy="18" rx="8" ry="2.5" fill="#4f46e5" opacity="0.9"/>
  <!-- Middle stripe (highlight) -->
  <ellipse cx="16" cy="14" rx="8" ry="2.5" fill="none" stroke="#818cf8" stroke-width="0.75" opacity="0.5"/>
  <!-- Factory chimney accents -->
  <rect x="10" y="20" width="3" height="5" rx="1" fill="#818cf8" opacity="0.6"/>
  <rect x="15" y="21" width="2" height="4" rx="1" fill="#818cf8" opacity="0.45"/>
  <rect x="19" y="20" width="3" height="5" rx="1" fill="#818cf8" opacity="0.6"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
</svg>
